services:
  - type: web
    name: drivebook-voice-service
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: COPILOT_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REQUEST_TIMEOUT
        value: 30000
